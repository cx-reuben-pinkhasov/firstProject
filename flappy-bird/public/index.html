<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ציפור עפה - Flappy Bird</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Auth Screen -->
    <div class="screen active" id="auth-screen">
        <h1>ציפור עפה</h1>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login">התחברות</button>
            <button class="auth-tab" id="tab-register">הרשמה</button>
        </div>

        <div class="auth-form" id="auth-form">
            <input type="text" id="username" placeholder="שם משתמש" autocomplete="username">
            <input type="password" id="password" placeholder="סיסמה" autocomplete="current-password">
            <div class="confirm-field" id="confirm-field">
                <input type="password" id="confirm-password" placeholder="אימות סיסמה" autocomplete="new-password">
            </div>
            <div class="error-msg" id="error-msg"></div>
            <button class="auth-btn" id="auth-btn">התחבר</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div class="screen" id="game-screen">
        <div class="game-header">
            <div class="user-info" id="user-info"></div>
            <div class="score-info">
                <div>ניקוד: <span id="current-score">0</span></div>
                <div>שיא: <span id="best-score">0</span></div>
            </div>
            <button class="logout-btn" id="logout-btn">התנתק</button>
        </div>
        <div class="canvas-container">
            <canvas id="game-canvas" width="400" height="600"></canvas>
            <div class="game-instructions" id="game-instructions">
                לחץ או הקש לעוף
                <div class="sub">רווח / לחיצה / מגע</div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="screen" id="gameover-screen">
        <h1>המשחק נגמר!</h1>
        <div class="gameover-box">
            <div>ניקוד סופי</div>
            <div class="final-score" id="final-score">0</div>
            <div class="best-score" id="final-best">שיא אישי: 0</div>
            <div class="new-record" id="new-record" style="display:none">שיא חדש!</div>
        </div>

        <div class="leaderboard">
            <h3>טבלת שיאים</h3>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>מקום</th>
                        <th>שחקן</th>
                        <th>ניקוד</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div class="gameover-buttons">
            <button class="play-again-btn" id="play-again-btn">שחק שוב</button>
            <button class="gameover-logout-btn" id="gameover-logout-btn">התנתק</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/screens.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
